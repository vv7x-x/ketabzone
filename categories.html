<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأقسام | KetabZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .cat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .cat-card:hover {
            transform: translateY(-10px);
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary-color);
        }
        .cat-icon { font-size: 3rem; }
        .cat-title { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Ketab<span>Zone</span></a>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="library.html">المكتبة</a>
                <a href="categories.html" class="active">الأقسام</a>
                <a href="about.html">من نحن</a>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title">تصفح <span>بالأقسام</span></h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px;">
                <a href="library.html?cat=روايات" class="cat-card">
                    <span class="cat-icon">📚</span>
                    <span class="cat-title">روايات</span>
                </a>
                <a href="library.html?cat=تنمية" class="cat-card">
                    <span class="cat-icon">🧠</span>
                    <span class="cat-title">تطوير الذات</span>
                </a>
                <a href="library.html?cat=تاريخ" class="cat-card">
                    <span class="cat-icon">📜</span>
                    <span class="cat-title">تاريخ</span>
                </a>
                <a href="library.html?cat=تقنية" class="cat-card">
                    <span class="cat-icon">💻</span>
                    <span class="cat-title">تقنية</span>
                </a>
                <a href="library.html?cat=قصص" class="cat-card">
                    <span class="cat-icon">📖</span>
                    <span class="cat-title">قصص قصيرة</span>
                </a>
            </div>
        </div>
    </section>
</body>
</html>
