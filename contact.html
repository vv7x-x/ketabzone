<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | KetabZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Ketab<span>Zone</span></a>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="library.html">المكتبة</a>
                <a href="about.html">من نحن</a>
                <a href="contact.html" class="active">تواصل معنا</a>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container glass-panel" style="padding: 40px; max-width: 600px; margin: 40px auto; text-align: right;">
            <h2 class="section-title" style="text-align: right;">أرسل لنا <span>رسالتك</span></h2>
            <form id="contactForm" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="display:block; margin-bottom:5px;">الاسم بالكامل:</label>
                    <input type="text" required style="width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);">
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px;">البريد الإلكتروني:</label>
                    <input type="email" required style="width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);">
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px;">موضوع الرسالة:</label>
                    <textarea rows="5" required style="width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 15px;">إرسال الآن 🚀</button>
            </form>
        </div>
    </section>
</body>
</html>
